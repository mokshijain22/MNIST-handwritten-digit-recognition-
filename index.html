<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNIST Digit Recognizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f0f13;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 16px;
        }

        header { text-align: center; margin-bottom: 28px; }
        header h1 { font-size: 2rem; font-weight: 700; color: #fff; letter-spacing: 1px; }
        header p { font-size: 0.85rem; color: #888; margin-top: 6px; }

        .badge {
            display: inline-block;
            background: #1e3a5f;
            color: #60a5fa;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 8px;
            border: 1px solid #2563eb44;
        }

        .main-layout {
            display: flex;
            gap: 28px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 860px;
        }

        .left-panel { display: flex; flex-direction: column; align-items: center; gap: 14px; }

        .canvas-wrapper {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 0 2px #333, 0 8px 32px rgba(0,0,0,0.5);
        }

        #canvas { display: block; cursor: crosshair; touch-action: none; background: #000; }

        .canvas-hint { font-size: 0.72rem; color: #555; text-align: center; }

        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        button {
            padding: 9px 22px;
            border: none;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-secondary { background: #1e1e2e; color: #aaa; border: 1px solid #333; }
        .btn-secondary:hover { background: #2a2a3e; color: #fff; }

        .upload-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }

        .upload-label {
            padding: 9px 16px;
            background: #1e1e2e;
            border: 1px dashed #444;
            border-radius: 8px;
            font-size: 0.82rem;
            color: #888;
            cursor: pointer;
            transition: all 0.15s;
        }
        .upload-label:hover { border-color: #2563eb; color: #60a5fa; }
        #imageUpload { display: none; }

        .right-panel { flex: 1; min-width: 280px; max-width: 380px; display: flex; flex-direction: column; gap: 16px; }

        .result-card {
            background: #16161f;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            padding: 20px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-idle { color: #444; font-size: 0.88rem; }
        .result-digit { font-size: 4.5rem; font-weight: 800; color: #60a5fa; line-height: 1; }
        .result-conf { font-size: 0.9rem; color: #888; margin-top: 4px; }

        .spinner {
            width: 28px; height: 28px;
            border: 3px solid #333;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .bars-card, .history-card {
            background: #16161f;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            padding: 16px 20px;
        }

        .card-title {
            font-size: 0.72rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
        .bar-label { width: 16px; font-size: 0.82rem; color: #aaa; text-align: right; flex-shrink: 0; }
        .bar-track { flex: 1; height: 10px; background: #1e1e2e; border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 6px; background: #2563eb; transition: width 0.45s cubic-bezier(.4,0,.2,1); width: 0%; }
        .bar-fill.top { background: #60a5fa; }
        .bar-pct { width: 40px; font-size: 0.74rem; color: #555; text-align: right; flex-shrink: 0; }

        .history-list { display: flex; gap: 8px; flex-wrap: wrap; }
        .history-item {
            background: #1e1e2e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            padding: 6px 14px;
            text-align: center;
            font-size: 0.75rem;
            color: #888;
        }
        .history-item span { display: block; font-size: 1.4rem; font-weight: 700; color: #60a5fa; line-height: 1.2; }
        .history-empty { color: #444; font-size: 0.82rem; }

        footer { margin-top: 36px; font-size: 0.75rem; color: #444; text-align: center; }
        footer a { color: #2563eb; text-decoration: none; }
        footer a:hover { color: #60a5fa; }
    </style>
</head>
<body>

<header>
    <h1>✏️ Digit Recognizer</h1>
    <p>Draw a digit (0–9) and let the model predict it</p>
    <span class="badge">CNN · 99%+ Accuracy · Trained on 60,000 MNIST samples</span>
</header>

<div class="main-layout">
    <div class="left-panel">
        <div class="canvas-wrapper">
            <canvas id="canvas" width="280" height="280"></canvas>
        </div>
        <p class="canvas-hint">Draw with mouse or finger</p>
        <div class="btn-row">
            <button class="btn-primary" onclick="predict()">Predict</button>
            <button class="btn-secondary" onclick="clearCanvas()">Clear</button>
        </div>
        <div class="upload-row">
            <label class="upload-label" for="imageUpload">📁 Upload Image</label>
            <input type="file" id="imageUpload" accept="image/*" onchange="uploadImage()">
        </div>
    </div>

    <div class="right-panel">
        <div class="result-card" id="resultCard">
            <span class="result-idle">Draw a digit and click Predict</span>
        </div>

        <div class="bars-card">
            <div class="card-title">Confidence — All Digits</div>
            <div id="barsContainer"></div>
        </div>

        <div class="history-card">
            <div class="card-title">Recent Predictions</div>
            <div class="history-list" id="historyList">
                <span class="history-empty">No predictions yet</span>
            </div>
        </div>
    </div>
</div>

<footer>
    Built with TensorFlow &amp; Flask &nbsp;·&nbsp;
    <a href="https://github.com/mokshijain22/MNIST-handwritten-digit-recognition-" target="_blank">GitHub</a>
    &nbsp;·&nbsp;
    <a href="https://mnist-handwritten-digit-recognition.onrender.com" target="_blank">Live Demo</a>
</footer>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 18;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    let drawing = false;

    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const src = e.touches ? e.touches[0] : e;
        return { x: src.clientX - r.left, y: src.clientY - r.top };
    }

    // Mouse events
    canvas.addEventListener("mousedown",  e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener("mouseup",    () => drawing = false);
    canvas.addEventListener("mouseleave", () => drawing = false);
    canvas.addEventListener("mousemove",  e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });

    // Touch events
    canvas.addEventListener("touchstart",  e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
    canvas.addEventListener("touchend",    e => { e.preventDefault(); drawing = false; }, { passive: false });
    canvas.addEventListener("touchcancel", e => { e.preventDefault(); drawing = false; }, { passive: false });
    canvas.addEventListener("touchmove",   e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, { passive: false });

    function clearCanvas() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        showIdle();
        renderBars(null);
    }

    function getImageData() {
        const sample = document.createElement("canvas");
        sample.width = canvas.width; sample.height = canvas.height;
        const sctx = sample.getContext("2d", { willReadFrequently: true });
        sctx.fillStyle = '#000'; sctx.fillRect(0, 0, sample.width, sample.height);
        sctx.drawImage(canvas, 0, 0);
        const src = sctx.getImageData(0, 0, sample.width, sample.height).data;

        let minX = sample.width, minY = sample.height, maxX = 0, maxY = 0;
        for (let y = 0; y < sample.height; y++) {
            for (let x = 0; x < sample.width; x++) {
                const i = (y * sample.width + x) * 4;
                if ((src[i] + src[i+1] + src[i+2]) / 3 > 30) {
                    minX = Math.min(minX, x); minY = Math.min(minY, y);
                    maxX = Math.max(maxX, x); maxY = Math.max(maxY, y);
                }
            }
        }
        if (minX > maxX || minY > maxY) return new Array(784).fill(0);

        const cropW = maxX - minX + 1, cropH = maxY - minY + 1;
        const crop = document.createElement("canvas");
        crop.width = cropW; crop.height = cropH;
        const cctx = crop.getContext("2d", { willReadFrequently: true });
        cctx.putImageData(sctx.getImageData(minX, minY, cropW, cropH), 0, 0);

        const temp = document.createElement("canvas");
        temp.width = 28; temp.height = 28;
        const tctx = temp.getContext("2d", { willReadFrequently: true });
        tctx.fillStyle = '#000'; tctx.fillRect(0, 0, 28, 28);
        const scale = Math.min(20 / cropW, 20 / cropH);
        const drawW = cropW * scale, drawH = cropH * scale;
        tctx.drawImage(crop, 0, 0, cropW, cropH, (28-drawW)/2, (28-drawH)/2, drawW, drawH);

        const data = tctx.getImageData(0, 0, 28, 28).data;
        const pixels = [];
        for (let i = 0; i < data.length; i += 4)
            pixels.push(Math.round((data[i] + data[i+1] + data[i+2]) / 3));
        return pixels;
    }

    function showIdle() {
        document.getElementById("resultCard").innerHTML = '<span class="result-idle">Draw a digit and click Predict</span>';
    }

    function showSpinner() {
        document.getElementById("resultCard").innerHTML = '<div class="spinner"></div>';
    }

    function showResult(prediction, confidence) {
        document.getElementById("resultCard").innerHTML = `
            <div class="result-digit">${prediction}</div>
            <div class="result-conf">${(confidence * 100).toFixed(1)}% confidence</div>`;
    }

    function renderBars(top3) {
        const container = document.getElementById("barsContainer");
        const all = new Array(10).fill(0);
        let topDigit = -1;
        if (top3) { top3.forEach(item => all[item.digit] = item.confidence); topDigit = top3[0].digit; }
        container.innerHTML = all.map((conf, i) => `
            <div class="bar-row">
                <span class="bar-label">${i}</span>
                <div class="bar-track"><div class="bar-fill ${i===topDigit?'top':''}" style="width:${(conf*100).toFixed(1)}%"></div></div>
                <span class="bar-pct" style="color:${i===topDigit?'#60a5fa':'#555'}">${top3 ? (conf*100).toFixed(1)+'%' : '—'}</span>
            </div>`).join('');
    }

    const history = [];
    function addHistory(digit, confidence) {
        history.unshift({ digit, confidence });
        if (history.length > 6) history.pop();
        document.getElementById("historyList").innerHTML = history.map(h => `
            <div class="history-item"><span>${h.digit}</span>${(h.confidence*100).toFixed(0)}%</div>`).join('');
    }

    function predict() {
        const pixels = getImageData();
        if (pixels.every(p => p === 0)) return;
        showSpinner();
        fetch("/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: pixels })
        })
        .then(res => res.json())
        .then(result => {
            showResult(result.prediction, result.confidence);
            renderBars(result.top3);
            addHistory(result.prediction, result.confidence);
        })
        .catch(() => {
            document.getElementById("resultCard").innerHTML = '<span class="result-idle" style="color:#f87171">Server error</span>';
        });
    }

    function uploadImage() {
        const file = document.getElementById("imageUpload").files[0];
        if (!file) return;
        showSpinner();
        const formData = new FormData();
        formData.append("file", file);
        fetch("/predict_image", { method: "POST", body: formData })
        .then(res => res.json())
        .then(result => {
            if (result.error) {
                document.getElementById("resultCard").innerHTML = `<span class="result-idle" style="color:#f87171">${result.error}</span>`;
                return;
            }
            showResult(result.prediction, result.confidence);
            renderBars(result.top3);
            addHistory(result.prediction, result.confidence);
        })
        .catch(() => {
            document.getElementById("resultCard").innerHTML = '<span class="result-idle" style="color:#f87171">Server error</span>';
        });
    }

    renderBars(null);
</script>
</body>
</html>
